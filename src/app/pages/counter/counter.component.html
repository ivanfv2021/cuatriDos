<h1>Esto es una prueba</h1>
<section>
    <article>
        <h2>
            Counter Component page
        </h2>
        <button (click)="increaseBy(1)">+1</button>
        <button (click)="increaseBy(-1)">-1</button>
        <button (click)="reset()">Reset</button>
        <h3>
            El valor del contador es: {{contador}}
        </h3>
        <h3>
            El valor del contador con señal es: {{contadorSignal()}}
        </h3>
    </article>
</section>
